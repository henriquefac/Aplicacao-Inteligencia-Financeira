services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull-model:
        condition: service_completed_successfully
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama-pull-model:
    image: ollama/ollama:latest
    env_file:
      - .env
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "sleep 2 && until ollama list > /dev/null 2>&1; do echo 'Waiting for Ollama DNS...'; sleep 2; done && ollama pull mistral"

volumes:
  backend_data:
  ollama_data:
